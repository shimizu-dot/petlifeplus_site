<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LINE お友達登録用 QRコード">
  <title>LINE お友達登録 QR | ペットライフプラス</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <main class="section section-alt">
    <div class="container" style="text-align: center;">
      <h1>LINE お友達登録 QR</h1>
      <p>スマートフォンで読み取って友達登録してください。</p>
      <div id="qr-canvas" style="display:inline-block; margin: 16px 0;"></div>
      <p><a class="btn btn-secondary" href="index.html">戻る</a></p>
    </div>
  </main>

  <!-- qrcodejs: ブラウザ内で QR コードを生成（LINE ID を外部サーバーに送信しない） -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qr-canvas'), {
      text: 'https://line.me/R/ti/p/%40434idigg',
      width: 240,
      height: 240
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 | ログイン</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Pet Life Plus 管理システム</h2>
      <p class="helper">管理者・スタッフ向けログイン</p>
      <div class="grid" style="margin-top:14px;">
        <div>
          <label>メールアドレス</label>
          <input type="email" value="admin@example.com" />
        </div>
        <div>
          <label>パスワード</label>
          <input type="password" value="password" />
          <div class="error" style="margin-top:6px;">※ サンプル表示: パスワードが正しくありません</div>
        </div>
        <a class="btn primary" href="./list.html" style="text-align:center;">ログイン</a>
        <a class="btn" href="#" style="text-align:center;">パスワードを忘れた場合</a>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>通知配信管理 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .notify-shell { max-width: 1100px; margin: 0 auto; }
    .notify-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
    .notify-card { border: 1px solid #dbe6f4; border-radius: 14px; overflow: hidden; background: #fff; box-shadow: 0 10px 20px rgba(15,23,42,.05); }
    .notify-head { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; background: linear-gradient(180deg,#f8fbff,#f4f8ff); }
    .notify-head strong { letter-spacing: .02em; }
    .notify-body { padding: 16px; }
    .notify-form { display: grid; gap: 12px; }
    .notify-form label { display: grid; gap: 6px; font-size: .92rem; color: #334155; font-weight: 600; }
    .notify-form input, .notify-form select, .notify-form textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; padding: 9px 10px; font-size: .95rem; }
    .notify-form textarea { resize: vertical; min-height: 120px; }
    .notify-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .notify-row { padding: 14px 16px; border-top: 1px solid #edf2f7; }
    .notify-row:first-child { border-top: 0; }
    .notify-title { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
    .notify-meta { font-size: .8rem; color: #64748b; margin-top: 6px; }
    .status-sent { background: #dcfce7; color: #166534; }
    .status-scheduled { background: #fef3c7; color: #92400e; }
    @media (max-width: 900px) { .notify-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <div class="main">
    <div class="topbar"><span class="topbar-title">通知配信管理</span></div>
    <div class="content notify-shell">
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div class="notify-grid">
        <section class="notify-card">
          <div class="notify-head"><strong>通知作成</strong></div>
          <div class="notify-body">
            <form class="notify-form" th:action="@{/app/notifications/manage}" th:object="${form}" method="post">
              <label>通知種別
                <select th:field="*{notificationType}">
                  <option value="INFO">INFO</option>
                  <option value="REMINDER">REMINDER</option>
                  <option value="ALERT">ALERT</option>
                </select>
              </label>
              <label>配信対象
                <select th:field="*{targetScope}">
                  <option value="ALL">全ユーザー</option>
                  <option value="USER">一般ユーザー</option>
                  <option value="STAFF">スタッフ系（SUPER/ADMIN/VET/STAFF）</option>
                  <option value="VET">獣医師系（SUPER/VET）</option>
                  <option value="ADMIN">管理者系（SUPER/ADMIN）</option>
                </select>
              </label>
              <label>タイトル
                <input type="text" th:field="*{title}" maxlength="100" required>
              </label>
              <label>本文
                <textarea th:field="*{body}" maxlength="2000" required></textarea>
              </label>
              <label>予約日時（空欄なら即時配信）
                <input type="datetime-local" th:field="*{scheduledAt}">
              </label>
              <div class="notify-actions">
                <button type="submit" class="btn btn-primary">保存</button>
                <a th:href="@{/app/notifications}" class="btn btn-secondary">通知一覧へ</a>
              </div>
            </form>
          </div>
        </section>

        <section class="notify-card">
          <div class="notify-head"><strong>配信履歴（作成分）</strong></div>
          <div th:if="${#lists.isEmpty(rows)}" class="notify-body" style="color:#64748b;">履歴はありません</div>
          <article th:each="r : ${rows}" class="notify-row">
            <div style="display:flex;justify-content:space-between;gap:10px;">
              <div>
                <div class="notify-title">
                  <span class="badge badge-blue" th:text="${r.notificationType()}">INFO</span>
                  <span class="badge" th:classappend="${r.deliveryStatus() == 'SENT' ? 'status-sent' : 'status-scheduled'}"
                        th:text="${r.deliveryStatus()}">SENT</span>
                  <strong th:text="${r.title()}">タイトル</strong>
                </div>
                <div style="white-space:pre-line;color:#475569;" th:text="${r.body()}">本文</div>
                <div class="notify-meta"
                     th:text="'作成: ' + ${#temporals.format(r.createdAt(), 'yyyy-MM-dd HH:mm')} + (${r.scheduledAt()} != null ? ' / 予約: ' + ${#temporals.format(r.scheduledAt(), 'yyyy-MM-dd HH:mm')} : '')">日時</div>
              </div>
              <form th:if="${r.deliveryStatus() == 'SCHEDULED'}"
                    th:action="@{/app/notifications/manage/{id}/send-now(id=${r.id()})}" method="post">
                <button type="submit" class="btn btn-secondary">今すぐ配信</button>
              </form>
            </div>
          </article>
        </section>
      </div>
    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約枠管理 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>
  <div class="main">
    <div class="topbar"><span class="topbar-title">予約枠管理</span></div>
    <div class="content">
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

      <div class="card" style="max-width:560px;">
        <div class="card-title">予約枠を追加</div>
        <form th:action="@{/app/admin/appointment-slots}" method="post">
          <div class="form-group">
            <label class="form-label" for="slotDatetime">日時<span class="required">*</span></label>
            <input id="slotDatetime" type="datetime-local" name="slotDatetime" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="note">メモ</label>
            <input id="note" type="text" name="note" class="form-control" maxlength="200" placeholder="担当者・場所など">
          </div>
          <button type="submit" class="btn btn-primary">追加</button>
        </form>
      </div>

      <div class="card">
        <div class="card-title">登録済み予約枠</div>
        <div class="table-wrap">
          <table class="table">
            <thead>
            <tr>
              <th>日時</th>
              <th>メモ</th>
              <th>状態</th>
              <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${slots.isEmpty()}">
              <td colspan="4" style="text-align:center;color:#64748B;">予約枠がありません</td>
            </tr>
            <tr th:each="slot : ${slots}">
              <td th:text="${#temporals.format(slot.slotDatetime(), 'yyyy-MM-dd HH:mm')}">2026-06-01 10:00</td>
              <td th:text="${slot.note() ?: '—'}">—</td>
              <td>
                <span th:if="${slot.slotDatetime().isBefore(#temporals.createNow())}" class="badge badge-gray">期限切れ</span>
                <span th:if="${slot.slotDatetime().isAfter(#temporals.createNow())}" class="badge badge-green">受付中</span>
              </td>
              <td>
                <form th:action="@{/app/admin/appointment-slots/{id}/delete(id=${slot.id()})}" method="post" style="margin:0;">
                  <button type="submit" class="btn btn-danger" style="padding:2px 10px;font-size:0.8rem;">削除</button>
                </form>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>

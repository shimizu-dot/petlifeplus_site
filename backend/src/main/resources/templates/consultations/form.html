<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode} ? '診療記録を編集 | Pet Life Plus' : '診療記録を登録 | Pet Life Plus'">診療記録 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" th:text="${editMode} ? '診療記録を編集' : '診療記録を登録'">診療記録</span>
    </div>
    <div class="content">

      <div class="breadcrumb">
        <a th:href="@{/app/consultations}">診療記録一覧</a> /
        <span th:text="${editMode} ? '編集' : '新規登録'">新規登録</span>
      </div>

      <div class="card" style="max-width:720px;">
        <form th:action="${editMode} ? @{/app/consultations/{id}(id=${consultationId})} : @{/app/consultations}"
              method="post" th:object="${form}">
          <input th:if="${editMode}" type="hidden" name="_method" value="PATCH">

          <div class="form-group">
            <label class="form-label" for="petId">対象ペット<span class="required">*</span></label>
            <select id="petId" th:field="*{petId}" class="form-control"
                    th:classappend="${#fields.hasErrors('petId')} ? 'is-invalid'">
              <option value="">選択してください</option>
              <option th:each="p : ${pets}" th:value="${p.id()}" th:text="${p.name()}">ポチ</option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('petId')}" th:errors="*{petId}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="performedOn">実施日<span class="required">*</span></label>
            <input id="performedOn" type="date" th:field="*{performedOn}" class="form-control"
                   th:classappend="${#fields.hasErrors('performedOn')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('performedOn')}" th:errors="*{performedOn}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="treatmentDetail">治療内容<span class="required">*</span></label>
            <textarea id="treatmentDetail" th:field="*{treatmentDetail}" rows="4"
                      maxlength="1000" class="form-control"
                      th:classappend="${#fields.hasErrors('treatmentDetail')} ? 'is-invalid'"
                      placeholder="実施した処置・治療の詳細を記入してください"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('treatmentDetail')}" th:errors="*{treatmentDetail}"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="diagnosis">診断</label>
            <textarea id="diagnosis" th:field="*{diagnosis}" rows="3"
                      maxlength="1000" class="form-control"
                      placeholder="病名・診断内容（任意）"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="prescription">処方・投薬</label>
            <textarea id="prescription" th:field="*{prescription}" rows="3"
                      maxlength="1000" class="form-control"
                      placeholder="処方薬・投与量・期間など（任意）"></textarea>
          </div>

          <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary"
                    th:text="${editMode} ? '更新する' : '登録する'">登録する</button>
            <a th:href="@{/app/consultations}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
</body>
</html>

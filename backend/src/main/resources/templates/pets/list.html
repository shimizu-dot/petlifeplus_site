<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ペット管理 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">ペット管理</span></div>
    <div class="content">

      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <div class="page-header">
        <h1 class="page-title">ペット一覧</h1>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="view-switch" role="group" aria-label="表示モード切替">
            <button type="button" class="view-switch-btn" data-view-mode="list">List</button>
            <button type="button" class="view-switch-btn" data-view-mode="grid">Grid</button>
            <button type="button" class="view-switch-btn" data-view-mode="table">Table</button>
          </div>
          <a th:href="@{/app/pets/new}" class="btn btn-primary">＋ ペット登録</a>
        </div>
      </div>

      <div id="petListRoot" class="card pet-list-root view-table" style="padding:0;">
        <div th:if="${page.items.isEmpty()}" class="empty-state">
          <div class="empty-state-icon">🐾</div>
          <div class="empty-state-text">まだペットが登録されていません</div>
          <a th:href="@{/app/pets/new}" class="btn btn-primary">最初のペットを登録する</a>
        </div>

        <div th:if="${!page.items.isEmpty()}" class="pet-view pet-view-list">
          <div th:each="pet : ${page.items}" class="pet-list-item">
            <div class="pet-list-main">
              <a th:href="@{/app/pets/{id}(id=${pet.id})}" class="pet-list-name" th:text="${pet.name}">ポチ</a>
              <div class="pet-list-sub">
                <span th:text="${pet.breed ?: '—'}">柴犬</span>
                <span> / </span>
                <span th:text="${pet.sex == 'MALE' ? 'オス' : pet.sex == 'FEMALE' ? 'メス' : '—'}">オス</span>
                <span> / </span>
                <span th:text="${pet.birthDate ?: '—'}">2021-03-01</span>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span th:class="${pet.species == 'DOG' ? 'badge badge-blue' : pet.species == 'CAT' ? 'badge badge-green' : 'badge badge-gray'}"
                    th:text="${pet.species == 'DOG' ? '犬' : pet.species == 'CAT' ? '猫' : pet.species}">犬</span>
              <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">永眠</span>
              <span th:if="${currentUser != null and currentUser.canManagePets()}"
                    th:class="${petPlanLabels[pet.id] == 'Premium' ? 'badge badge-red' :
                              petPlanLabels[pet.id] == 'Standard' ? 'badge badge-blue' : 'badge badge-green'}"
                    th:text="${petPlanLabels[pet.id] ?: 'Light'}">Light</span>
              <div class="table-actions">
                <a th:href="@{/app/pets/{id}(id=${pet.id})}" class="btn btn-secondary btn-sm">詳細</a>
                <a th:if="${pet.deceasedAt == null}" th:href="@{/app/pets/{id}/health-records(id=${pet.id})}" class="btn btn-secondary btn-sm">健康記録</a>
                <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}(id=${pet.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('削除しますか？')">
                  <input type="hidden" name="_method" value="DELETE">
                  <button type="submit" class="btn btn-danger btn-sm">削除</button>
                </form>
                <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}/decease(id=${pet.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('このペットを永眠として登録しますか？')">
                  <button type="submit" class="btn btn-secondary btn-sm">永眠</button>
                </form>
                <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">操作不可</span>
              </div>
            </div>
          </div>
        </div>

        <div th:if="${!page.items.isEmpty()}" class="pet-view pet-view-grid">
          <div th:each="pet : ${page.items}" class="pet-grid-item">
            <a th:href="@{/app/pets/{id}(id=${pet.id})}" class="pet-grid-name" th:text="${pet.name}">ポチ</a>
            <div class="pet-grid-sub" th:text="${pet.breed ?: '—'}">柴犬</div>
            <div class="pet-grid-sub" th:text="${pet.sex == 'MALE' ? 'オス' : pet.sex == 'FEMALE' ? 'メス' : '—'}">オス</div>
            <div class="pet-grid-sub" th:text="${pet.birthDate ?: '—'}">2021-03-01</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;">
              <span th:class="${pet.species == 'DOG' ? 'badge badge-blue' : pet.species == 'CAT' ? 'badge badge-green' : 'badge badge-gray'}"
                    th:text="${pet.species == 'DOG' ? '犬' : pet.species == 'CAT' ? '猫' : pet.species}">犬</span>
              <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">永眠</span>
              <span th:if="${currentUser != null and currentUser.canManagePets()}"
                    th:class="${petPlanLabels[pet.id] == 'Premium' ? 'badge badge-red' :
                              petPlanLabels[pet.id] == 'Standard' ? 'badge badge-blue' : 'badge badge-green'}"
                    th:text="${petPlanLabels[pet.id] ?: 'Light'}">Light</span>
            </div>
            <div class="table-actions">
              <a th:href="@{/app/pets/{id}(id=${pet.id})}" class="btn btn-secondary btn-sm">詳細</a>
              <a th:if="${pet.deceasedAt == null}" th:href="@{/app/pets/{id}/health-records(id=${pet.id})}" class="btn btn-secondary btn-sm">健康記録</a>
              <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}(id=${pet.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('削除しますか？')">
                <input type="hidden" name="_method" value="DELETE">
                <button type="submit" class="btn btn-danger btn-sm">削除</button>
              </form>
              <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}/decease(id=${pet.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('このペットを永眠として登録しますか？')">
                <button type="submit" class="btn btn-secondary btn-sm">永眠</button>
              </form>
              <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">操作不可</span>
            </div>
          </div>
        </div>

        <div th:if="${!page.items.isEmpty()}" class="pet-view pet-view-table table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>名前</th>
                <th>種別</th>
                <th>品種</th>
                <th>性別</th>
                <th>生年月日</th>
                <th th:if="${currentUser != null and currentUser.canManagePets()}">サービスレベル</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="pet : ${page.items}">
                <td>
                  <a th:href="@{/app/pets/{id}(id=${pet.id})}"
                     style="color:var(--primary);font-weight:600;text-decoration:none;"
                     th:text="${pet.name}">ポチ</a>
                </td>
                <td>
                  <span th:class="${pet.species == 'DOG' ? 'badge badge-blue' : pet.species == 'CAT' ? 'badge badge-green' : 'badge badge-gray'}"
                        th:text="${pet.species == 'DOG' ? '犬' : pet.species == 'CAT' ? '猫' : pet.species}">犬</span>
                  <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">永眠</span>
                </td>
                <td th:text="${pet.breed ?: '—'}">柴犬</td>
                <td th:text="${pet.sex == 'MALE' ? 'オス' : pet.sex == 'FEMALE' ? 'メス' : '—'}">オス</td>
                <td th:text="${pet.birthDate ?: '—'}">2021-03-01</td>
                <td th:if="${currentUser != null and currentUser.canManagePets()}">
                  <span th:class="${petPlanLabels[pet.id] == 'Premium' ? 'badge badge-red' :
                                    petPlanLabels[pet.id] == 'Standard' ? 'badge badge-blue' : 'badge badge-green'}"
                        th:text="${petPlanLabels[pet.id] ?: 'Light'}">Light</span>
                </td>
                <td>
                  <div class="table-actions">
                    <a th:href="@{/app/pets/{id}(id=${pet.id})}" class="btn btn-secondary btn-sm">詳細</a>
                    <a th:if="${pet.deceasedAt == null}" th:href="@{/app/pets/{id}/health-records(id=${pet.id})}" class="btn btn-secondary btn-sm">健康記録</a>
                    <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}(id=${pet.id})}" method="post" style="display:inline;"
                          onsubmit="return confirm('削除しますか？')">
                      <input type="hidden" name="_method" value="DELETE">
                      <button type="submit" class="btn btn-danger btn-sm">削除</button>
                    </form>
                    <form th:if="${pet.deceasedAt == null}" th:action="@{/app/pets/{id}/decease(id=${pet.id})}" method="post" style="display:inline;"
                          onsubmit="return confirm('このペットを永眠として登録しますか？')">
                      <button type="submit" class="btn btn-secondary btn-sm">永眠</button>
                    </form>
                    <span th:if="${pet.deceasedAt != null}" class="badge badge-gray">操作不可</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="pagination-summary" th:if="${page.total > 0}"
           th:text="'全' + ${page.total} + '件中 ' + ${((page.page - 1) * page.size + 1)} + '-' + ${((page.page - 1) * page.size + #lists.size(page.items))} + '件'">
        全50件中 1-10件
      </div>

      <div class="pagination" th:if="${page.total > page.size}">
        <a th:if="${page.page > 1}" th:href="@{/app/pets(page=${page.page - 1},size=${page.size})}">前へ</a>
        <span th:each="i : ${#numbers.sequence(1, (page.total + page.size - 1) / page.size)}">
          <span th:if="${i == page.page}" class="current" th:text="${i}">1</span>
          <a th:if="${i != page.page}" th:href="@{/app/pets(page=${i},size=${page.size})}" th:text="${i}">2</a>
        </span>
        <a th:if="${page.page * page.size < page.total}" th:href="@{/app/pets(page=${page.page + 1},size=${page.size})}">次へ</a>
      </div>

    </div>
  </div>
</div>
<script>
  (function () {
    const root = document.getElementById('petListRoot');
    const buttons = document.querySelectorAll('.view-switch-btn');
    if (!root || buttons.length === 0) return;

    const storageKey = 'pets.list.viewMode';
    const allowed = ['list', 'grid', 'table'];

    function applyView(mode) {
      const safeMode = allowed.includes(mode) ? mode : 'table';
      root.classList.remove('view-list', 'view-grid', 'view-table');
      root.classList.add('view-' + safeMode);
      buttons.forEach((btn) => {
        const active = btn.dataset.viewMode === safeMode;
        btn.classList.toggle('is-active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      localStorage.setItem(storageKey, safeMode);
    }

    const saved = localStorage.getItem(storageKey);
    applyView(saved || 'table');
    buttons.forEach((btn) => btn.addEventListener('click', () => applyView(btn.dataset.viewMode)));
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode ? 'ペット編集' : 'ペット登録'} + ' | Pet Life Plus'">ペット登録 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" th:text="${editMode ? 'ペット編集' : 'ペット登録'}">ペット登録</span>
    </div>
    <div class="content">

      <div class="breadcrumb">
        <a th:href="@{/app/pets}">ペット一覧</a> /
        <span th:text="${editMode ? 'ペット編集' : 'ペット登録'}">ペット登録</span>
      </div>

      <div class="card" style="max-width:640px;">
        <div class="card-title" th:text="${editMode ? 'ペット情報を編集' : '新しいペットを登録'}">新しいペットを登録</div>

        <form th:action="${editMode ? '/app/pets/' + petId : '/app/pets'}"
              method="post" enctype="multipart/form-data" th:object="${form}">
          <input th:if="${editMode}" type="hidden" name="_method" value="PATCH">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="name">ペット名<span class="required">*</span></label>
              <input id="name" type="text" th:field="*{name}" class="form-control"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="例：ポチ" maxlength="100">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="species">種別<span class="required">*</span></label>
              <select id="species" th:field="*{species}" class="form-control"
                      th:classappend="${#fields.hasErrors('species')} ? 'is-invalid'">
                <option value="DOG">犬</option>
              </select>
              <div class="form-hint">現在は犬のみ対応しています（他種別は今後対応予定）。</div>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('species')}" th:errors="*{species}"></div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="breed">品種</label>
              <input id="breed" type="text" th:field="*{breed}" class="form-control" placeholder="例：柴犬" maxlength="100">
            </div>
            <div class="form-group">
              <label class="form-label" for="sex">性別</label>
              <select id="sex" th:field="*{sex}" class="form-control">
                <option value="">不明</option>
                <option value="MALE">オス</option>
                <option value="FEMALE">メス</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="birthDate">生年月日</label>
              <input id="birthDate" type="date" th:field="*{birthDate}" class="form-control"
                     th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('birthDate')}" th:errors="*{birthDate}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="weightBaselineKg">基準体重 (kg)</label>
              <input id="weightBaselineKg" type="number" th:field="*{weightBaselineKg}" class="form-control"
                     step="0.01" min="0" placeholder="例：8.50">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="imageFile">ペット画像</label>
            <input id="imageFile" type="file" name="imageFile" class="form-control" accept="image/*">
            <div class="form-hint">jpeg / png / webp / gif（任意）</div>
            <div th:if="${editMode and petImagePath != null}" style="margin-top:8px;">
              <img th:src="${petImagePath}" alt="current-pet-image"
                   style="width:140px;height:140px;object-fit:cover;border-radius:10px;border:1px solid #CBD5E1;">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${editMode ? '更新する' : '登録する'}">登録する</button>
            <a th:href="@{/app/pets}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode ? '健康記録 編集' : '健康記録 登録'} + ' | Pet Life Plus'">健康記録 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <style>
    .score-scale {
      margin-top: 6px;
    }
    .score-scale-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }
    .score-picker {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      align-items: center;
      max-width: 280px;
      padding: 4px 0;
    }
    .score-picker::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      height: 2px;
      background: #94a3b8;
      transform: translateY(-50%);
      z-index: 0;
    }
    .score-btn {
      border: 2px solid #64748b;
      background: #fff;
      border-radius: 999px;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      z-index: 1;
      margin: 0 auto;
      padding: 0;
    }
    .score-btn:hover {
      border-color: #3b82f6;
    }
    .score-btn.active {
      border-color: #2563eb;
      background: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }
    .overall-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
    }
    .overall-preview img {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #fff;
    }
    .overall-preview-text {
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" th:text="${editMode ? '健康記録 編集' : '健康記録 登録'}">健康記録 登録</span>
    </div>
    <div class="content">

      <div class="breadcrumb">
        <a th:href="@{/app/pets}">ペット一覧</a> /
        <a th:href="@{/app/pets/{id}(id=${pet.id})}" th:text="${pet.name}">ペット名</a> /
        <a th:href="@{/app/pets/{id}/health-records(id=${pet.id})}">健康記録</a> /
        <span th:text="${editMode ? '編集' : '登録'}">登録</span>
      </div>

      <div class="card" style="max-width:640px;">
        <div class="card-title"
             th:text="${pet.name} + ' の健康記録を' + (${editMode} ? '編集' : '登録')">健康記録を登録</div>

        <form th:action="${editMode
                          ? '/app/pets/' + pet.id + '/health-records/' + recordId
                          : '/app/pets/' + pet.id + '/health-records'}"
              method="post" enctype="multipart/form-data" th:object="${form}">
          <input th:if="${editMode}" type="hidden" name="_method" value="PATCH">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="recordDate">記録日<span class="required">*</span></label>
              <input th:if="${!editMode}" id="recordDate" type="date" th:field="*{recordDate}" class="form-control"
                     th:attr="max=${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                     th:classappend="${#fields.hasErrors('recordDate')} ? 'is-invalid'">
              <input th:if="${editMode}" type="hidden" th:field="*{recordDate}">
              <div th:if="${editMode}" class="form-control" style="background:#F8FAFC;"
                   th:text="${form.recordDate}">2026-05-19</div>
              <div class="form-hint" th:if="${!editMode}">新規登録では当日または過去の日付のみ指定できます。</div>
              <div class="form-hint" th:if="${editMode}">既存データの編集では記録日は変更できません。</div>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('recordDate')}" th:errors="*{recordDate}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="weightKg">体重 (kg)</label>
              <input id="weightKg" type="number" th:field="*{weightKg}" class="form-control"
                     step="0.01" min="0" max="200" placeholder="例：8.60">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="exerciseMinutes">運動時間 (分)</label>
              <input id="exerciseMinutes" type="number" th:field="*{exerciseMinutes}" class="form-control"
                     min="0" placeholder="例：30">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">食事（5段階）</label>
              <input type="hidden" name="mealScore" th:value="${form.mealScore != null ? form.mealScore : 3}" data-score-input="mealScore">
              <div class="score-scale">
                <div class="score-scale-header"><span>悪い</span><span>良い</span></div>
                <div class="score-picker" data-score-picker="mealScore">
                  <button type="button" class="score-btn" data-score="1" aria-label="食事 1"></button>
                  <button type="button" class="score-btn" data-score="2" aria-label="食事 2"></button>
                  <button type="button" class="score-btn" data-score="3" aria-label="食事 3"></button>
                  <button type="button" class="score-btn" data-score="4" aria-label="食事 4"></button>
                  <button type="button" class="score-btn" data-score="5" aria-label="食事 5"></button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">運動（5段階）</label>
              <input type="hidden" name="exerciseScore" th:value="${form.exerciseScore != null ? form.exerciseScore : 3}" data-score-input="exerciseScore">
              <div class="score-scale">
                <div class="score-scale-header"><span>悪い</span><span>良い</span></div>
                <div class="score-picker" data-score-picker="exerciseScore">
                  <button type="button" class="score-btn" data-score="1" aria-label="運動 1"></button>
                  <button type="button" class="score-btn" data-score="2" aria-label="運動 2"></button>
                  <button type="button" class="score-btn" data-score="3" aria-label="運動 3"></button>
                  <button type="button" class="score-btn" data-score="4" aria-label="運動 4"></button>
                  <button type="button" class="score-btn" data-score="5" aria-label="運動 5"></button>
                </div>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">睡眠（5段階）</label>
              <input type="hidden" name="sleepScore" th:value="${form.sleepScore != null ? form.sleepScore : 3}" data-score-input="sleepScore">
              <div class="score-scale">
                <div class="score-scale-header"><span>悪い</span><span>良い</span></div>
                <div class="score-picker" data-score-picker="sleepScore">
                  <button type="button" class="score-btn" data-score="1" aria-label="睡眠 1"></button>
                  <button type="button" class="score-btn" data-score="2" aria-label="睡眠 2"></button>
                  <button type="button" class="score-btn" data-score="3" aria-label="睡眠 3"></button>
                  <button type="button" class="score-btn" data-score="4" aria-label="睡眠 4"></button>
                  <button type="button" class="score-btn" data-score="5" aria-label="睡眠 5"></button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">機嫌（5段階）</label>
              <input type="hidden" name="moodScore" th:value="${form.moodScore != null ? form.moodScore : 3}" data-score-input="moodScore">
              <div class="score-scale">
                <div class="score-scale-header"><span>悪い</span><span>良い</span></div>
                <div class="score-picker" data-score-picker="moodScore">
                  <button type="button" class="score-btn" data-score="1" aria-label="機嫌 1"></button>
                  <button type="button" class="score-btn" data-score="2" aria-label="機嫌 2"></button>
                  <button type="button" class="score-btn" data-score="3" aria-label="機嫌 3"></button>
                  <button type="button" class="score-btn" data-score="4" aria-label="機嫌 4"></button>
                  <button type="button" class="score-btn" data-score="5" aria-label="機嫌 5"></button>
                </div>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">総合評価（5段階）</label>
              <input type="hidden" name="overallScore" th:value="${form.overallScore != null ? form.overallScore : 3}" data-score-input="overallScore">
              <div class="score-scale">
                <div class="score-scale-header"><span>悪い</span><span>良い</span></div>
                <div class="score-picker" data-score-picker="overallScore">
                  <button type="button" class="score-btn" data-score="1" aria-label="総合評価 1"></button>
                  <button type="button" class="score-btn" data-score="2" aria-label="総合評価 2"></button>
                  <button type="button" class="score-btn" data-score="3" aria-label="総合評価 3"></button>
                  <button type="button" class="score-btn" data-score="4" aria-label="総合評価 4"></button>
                  <button type="button" class="score-btn" data-score="5" aria-label="総合評価 5"></button>
                </div>
              </div>
            </div>
            <div class="form-group">
              <div class="overall-preview">
                <img id="overallFacePreview" th:src="@{/assets/img/A3.png}" alt="総合評価プレビュー">
                <div id="overallFacePreviewText" class="overall-preview-text">平均: 3.0（A3）</div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="mealMemo">食事メモ</label>
            <textarea id="mealMemo" th:field="*{mealMemo}" class="form-control" rows="3"
                      maxlength="300" placeholder="例：食欲良好、いつもより少なめ など"
                      th:classappend="${#fields.hasErrors('mealMemo')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('mealMemo')}" th:errors="*{mealMemo}"></div>
            <div class="form-hint">300文字以内</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="note">メモ</label>
            <textarea id="note" th:field="*{note}" class="form-control" rows="3"
                      maxlength="1000" placeholder="気になる点、様子など自由に記録"
                      th:classappend="${#fields.hasErrors('note')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></div>
            <div class="form-hint">1000文字以内</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="imageFile">画像</label>
            <input id="imageFile" type="file" name="imageFile" class="form-control" accept="image/*">
            <div class="form-hint">jpeg / png / webp / gif（任意）</div>
            <div th:if="${editMode and recordImagePath != null}" style="margin-top:8px;">
              <img th:src="${recordImagePath}" alt="current-health-image"
                   style="width:140px;height:140px;object-fit:cover;border-radius:10px;border:1px solid #CBD5E1;">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${editMode ? '更新する' : '登録する'}">登録する</button>
            <a th:href="@{/app/pets/{id}/health-records(id=${pet.id})}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
<script>
  var clamp = function (n, min, max) {
    return Math.max(min, Math.min(max, n));
  };

  var updateOverallFacePreview = function () {
    var keys = ["mealScore", "exerciseScore", "sleepScore", "moodScore", "overallScore"];
    var values = keys.map(function (key) {
      var el = document.querySelector("[data-score-input='" + key + "']");
      return Number(el && el.value ? el.value : 3);
    });
    var avg = values.reduce(function (sum, v) { return sum + v; }, 0) / values.length;
    var rounded = clamp(Math.round(avg), 1, 5);
    var img = document.getElementById("overallFacePreview");
    var text = document.getElementById("overallFacePreviewText");
    if (img) img.src = "/assets/img/A" + rounded + ".png";
    if (text) text.textContent = "平均: " + avg.toFixed(1) + "（A" + rounded + "）";
  };

  document.querySelectorAll("[data-score-picker]").forEach(function (picker) {
    var key = picker.getAttribute("data-score-picker");
    var input = document.querySelector("[data-score-input='" + key + "']");
    if (!input) return;

    var updateActive = function (value) {
      picker.querySelectorAll(".score-btn").forEach(function (btn) {
        btn.classList.toggle("active", btn.getAttribute("data-score") === String(value));
      });
    };

    if (!input.value) input.value = "3";
    updateActive(input.value);

    picker.querySelectorAll(".score-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        input.value = btn.getAttribute("data-score");
        updateActive(input.value);
        updateOverallFacePreview();
      });
    });
  });

  updateOverallFacePreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お知らせ管理 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">お知らせ管理</span></div>
    <div class="content">

      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

      <!-- 新規登録 -->
      <div class="card" style="max-width:680px;">
        <div class="card-title">お知らせを追加</div>
        <form th:action="@{/app/admin/announcements}" method="post">
          <div class="form-group">
            <label class="form-label">タイトル<span class="required">*</span></label>
            <input type="text" name="title" class="form-control" maxlength="200" placeholder="例：年末年始の診療時間について">
          </div>
          <div class="form-group">
            <label class="form-label">本文<span class="required">*</span></label>
            <textarea name="body" class="form-control" rows="4" maxlength="2000"
                      placeholder="お知らせの詳細内容を入力してください"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">登録する</button>
        </form>
      </div>

      <!-- 一覧 -->
      <div class="card">
        <div class="card-title">登録済みお知らせ</div>
        <div th:if="${announcements.isEmpty()}" style="color:#64748B;padding:16px 0;">
          登録されているお知らせはありません
        </div>
        <div th:each="a : ${announcements}"
             style="padding:16px 0;border-bottom:1px solid #E2E8F0;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <span th:if="${a.isActive()}"  class="badge badge-green">公開中</span>
                <span th:if="${!a.isActive()}" class="badge badge-gray">非公開</span>
                <strong th:text="${a.title()}">タイトル</strong>
              </div>
              <div style="color:#475569;font-size:14px;white-space:pre-wrap;" th:text="${a.body()}">本文</div>
              <div style="font-size:12px;color:#94A3B8;margin-top:6px;"
                   th:text="${#temporals.format(a.createdAt(), 'yyyy/MM/dd HH:mm')}"></div>
            </div>
            <div style="display:flex;gap:8px;flex-shrink:0;">
              <form th:action="@{/app/admin/announcements/{id}/toggle(id=${a.id()})}" method="post">
                <button type="submit" class="btn btn-secondary btn-sm"
                        th:text="${a.isActive()} ? '非公開にする' : '公開する'">切替</button>
              </form>
              <form th:action="@{/app/admin/announcements/{id}/delete(id=${a.id()})}" method="post"
                    onsubmit="return confirm('このお知らせを削除してよろしいですか？')">
                <button type="submit" class="btn btn-danger btn-sm">削除</button>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>

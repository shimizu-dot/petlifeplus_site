<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ユーザー管理 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">ユーザー管理</span></div>
    <div class="content">

      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

      <div class="page-header">
        <h1 class="page-title">ユーザー一覧</h1>
        <a th:href="@{/app/admin/users/new}" class="btn btn-primary">＋ ユーザー登録</a>
      </div>

      <div class="card" style="padding:0;">
        <div th:if="${page.items.isEmpty()}" class="empty-state">
          <div class="empty-state-icon">👤</div>
          <div class="empty-state-text">ユーザーがいません</div>
        </div>

        <div th:if="${!page.items.isEmpty()}" class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>氏名</th>
                <th>メール</th>
                <th>電話番号</th>
                <th>ロール</th>
                <th>ステータス</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="user : ${page.items}">
                <td th:text="${user.id}">1</td>
                <td style="font-weight:600;" th:text="${user.name}">管理 太郎</td>
                <td th:text="${user.email}">admin@example.com</td>
                <td th:text="${user.phone ?: '—'}">090-0000-0000</td>
                <td>
                  <span th:class="${user.roleId == 1 ? 'badge badge-red' :
                                    user.roleId == 3 ? 'badge badge-blue' :
                                    user.roleId == 4 ? 'badge badge-yellow' : 'badge badge-green'}"
                        th:text="${user.roleId == 1 ? '管理者' :
                                   user.roleId == 3 ? '獣医師' :
                                   user.roleId == 4 ? 'スタッフ' : '一般ユーザー'}">一般</span>
                </td>
                <td>
                  <span th:class="${user.status == 'ACTIVE' ? 'badge badge-green' : 'badge badge-gray'}"
                        th:text="${user.status == 'ACTIVE' ? '有効' : '無効'}">有効</span>
                </td>
                <td>
                  <div class="table-actions">
                    <a th:href="@{/app/admin/users/{id}/edit(id=${user.id})}"
                       class="btn btn-secondary btn-sm">編集</a>
                    <form th:action="@{/app/admin/users/{id}(id=${user.id})}" method="post"
                          style="display:inline;"
                          onsubmit="return confirm('削除しますか？')">
                      <input type="hidden" name="_method" value="DELETE">
                      <button type="submit" class="btn btn-danger btn-sm">削除</button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="pagination" th:if="${page.total > page.size}">
        <a th:if="${page.page > 1}" th:href="@{/app/admin/users(page=${page.page - 1})}">‹</a>
        <span th:each="i : ${#numbers.sequence(1, (page.total + page.size - 1) / page.size)}"
              th:class="${i == page.page ? 'current' : ''}" th:text="${i}">1</span>
        <a th:if="${page.page * page.size < page.total}"
           th:href="@{/app/admin/users(page=${page.page + 1})}">›</a>
      </div>

    </div>
  </div>
</div>
</body>
</html>

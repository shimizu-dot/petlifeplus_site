<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${editMode ? 'ユーザー編集' : 'ユーザー登録'} + ' | Pet Life Plus'">ユーザー登録 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title" th:text="${editMode ? 'ユーザー編集' : 'ユーザー登録'}">ユーザー登録</span>
    </div>
    <div class="content">

      <div class="breadcrumb">
        <a th:href="@{/app/admin/users}">ユーザー一覧</a> /
        <span th:text="${editMode ? 'ユーザー編集' : 'ユーザー登録'}">ユーザー登録</span>
      </div>

      <div class="card" style="max-width:640px;">
        <div class="card-title" th:text="${editMode ? 'ユーザー情報を編集' : '新しいユーザーを登録'}">ユーザー登録</div>

        <form th:action="${editMode ? '/app/admin/users/' + userId : '/app/admin/users'}"
              method="post" th:object="${form}">
          <input th:if="${editMode}" type="hidden" name="_method" value="PATCH">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="name">氏名<span class="required">*</span></label>
              <input id="name" type="text" th:field="*{name}" class="form-control"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" maxlength="100">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="roleId">ロール<span class="required">*</span></label>
              <select id="roleId" th:field="*{roleId}" class="form-control"
                      th:classappend="${#fields.hasErrors('roleId')} ? 'is-invalid'">
                <option value="">選択してください</option>
                <option value="1">管理者</option>
                <option value="2">一般ユーザー</option>
                <option value="3">獣医師</option>
                <option value="4">スタッフ</option>
              </select>
              <div class="invalid-feedback" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">メールアドレス<span class="required">*</span></label>
            <input id="email" type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" maxlength="255">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="password">
                パスワード<span class="required" th:if="${!editMode}">*</span>
              </label>
              <input id="password" type="password" th:field="*{password}" class="form-control"
                     th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                     th:placeholder="${editMode ? '変更する場合のみ入力' : '8文字以上64文字以内'}">
              <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">電話番号</label>
              <input id="phone" type="tel" th:field="*{phone}" class="form-control"
                     placeholder="例：090-1234-5678">
            </div>
          </div>

          <div class="form-group" th:if="${editMode}">
            <label class="form-label" for="status">ステータス</label>
            <select id="status" th:field="*{status}" class="form-control">
              <option value="ACTIVE">有効</option>
              <option value="INACTIVE">無効</option>
              <option value="SUSPENDED">停止</option>
            </select>
          </div>

          <div class="form-group" th:if="${editMode}">
            <label class="form-label" for="planTier">一般ユーザープラン</label>
            <select id="planTier" th:field="*{planTier}" class="form-control">
              <option value="LIGHT">Light</option>
              <option value="STANDARD">Standard</option>
              <option value="PREMIUM">Premium</option>
            </select>
            <div class="form-hint">ロールが一般ユーザーの場合に適用されます。</div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" th:text="${editMode ? '更新する' : '登録する'}">登録する</button>
            <a th:href="@{/app/admin/users}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

      <div class="card" style="max-width:640px;" th:if="${editMode}">
        <div class="card-title">紐づくペット情報</div>
        <div th:if="${#lists.isEmpty(linkedPets)}" class="empty-state" style="padding:20px 12px;">
          <div class="empty-state-text" style="margin-bottom:0;">紐づくペットはありません</div>
        </div>
        <div th:if="${!#lists.isEmpty(linkedPets)}" class="table-wrap">
          <table class="table">
            <thead>
            <tr>
              <th>名前</th>
              <th>種別</th>
              <th>品種</th>
              <th>性別</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="pet : ${linkedPets}">
              <td>
                <a th:href="@{/app/pets/{id}(id=${pet.id})}"
                   style="color:var(--primary);font-weight:600;text-decoration:none;"
                   th:text="${pet.name}">ポチ</a>
              </td>
              <td th:text="${pet.species == 'DOG' ? '犬' : pet.species == 'CAT' ? '猫' : pet.species}">犬</td>
              <td th:text="${pet.breed ?: '—'}">柴犬</td>
              <td th:text="${pet.sex == 'MALE' ? 'オス' : pet.sex == 'FEMALE' ? 'メス' : '—'}">オス</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>

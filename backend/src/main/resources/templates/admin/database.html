<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DBバックアップ・リストア | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">🗄️ DBバックアップ・リストア</span></div>
    <div class="content">

      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

      <!-- バックアップ -->
      <div class="card" style="max-width:640px;">
        <div class="card-title">📥 バックアップのダウンロード</div>
        <p style="font-size:14px;color:#475569;margin-bottom:16px;">
          現在のデータベース全体を <code>pg_dump</code> で SQL ファイルに書き出し、ダウンロードします。<br>
          ファイル名は <code>petlife_backup_YYYY-MM-DD.sql</code> になります。
        </p>
        <form th:action="@{/app/admin/database/backup}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-primary">⬇ バックアップをダウンロード</button>
        </form>
      </div>

      <!-- リストア -->
      <div class="card" style="max-width:640px;border-left:4px solid #EF4444;">
        <div class="card-title" style="color:#B91C1C;">⚠️ リストア（データ上書き）</div>
        <div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:12px 16px;margin-bottom:16px;">
          <p style="font-size:13px;color:#991B1B;margin:0;font-weight:600;">
            この操作は現在のデータベースに SQL を直接適用します。<br>
            誤ったファイルを適用すると データが失われる可能性があります。<br>
            必ず事前にバックアップを取得してから実行してください。
          </p>
        </div>
        <p style="font-size:14px;color:#475569;margin-bottom:16px;">
          アップロードした <code>.sql</code> ファイルを <code>psql</code> でデータベースに適用します。
        </p>
        <form th:action="@{/app/admin/database/restore}" method="post"
              enctype="multipart/form-data"
              onsubmit="return confirmRestore()">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="form-group">
            <label class="form-label">SQLファイルを選択<span class="required">*</span></label>
            <input type="file" name="file" accept=".sql" class="form-control" required>
            <span style="font-size:12px;color:#94A3B8;">.sql ファイルのみ対応</span>
          </div>
          <button type="submit" class="btn" style="background:#EF4444;color:#fff;">
            ⚠ リストアを実行する
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
<script>
function confirmRestore() {
  return confirm(
    'データベースをリストアします。\n' +
    'この操作は元に戻せません。\n\n' +
    '本当に実行しますか？'
  );
}
</script>
</body>
</html>

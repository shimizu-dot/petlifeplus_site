<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワード変更 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">パスワード変更</span></div>
    <div class="content">

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <div class="card" style="max-width:480px;">
        <div class="card-title">パスワードを変更する</div>
        <form th:action="@{/app/password-resets}" method="post">
          <div class="form-group">
            <label class="form-label" for="currentPassword">現在のパスワード<span class="required">*</span></label>
            <input id="currentPassword" type="password" name="currentPassword"
                   class="form-control" required autocomplete="current-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="newPassword">新しいパスワード<span class="required">*</span></label>
            <input id="newPassword" type="password" name="newPassword"
                   class="form-control" required minlength="8" autocomplete="new-password">
            <div class="form-hint">8文字以上で入力してください</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">新しいパスワード（確認）<span class="required">*</span></label>
            <input id="confirmPassword" type="password" name="confirmPassword"
                   class="form-control" required minlength="8" autocomplete="new-password">
          </div>
          <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary">変更する</button>
            <a th:href="@{/app/dashboard}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
</body>
</html>

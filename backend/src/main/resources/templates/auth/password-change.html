<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワード変更 | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body th:class="${bodyClass}">
<div class="layout">
  <div th:replace="~{fragments/nav :: sidebar}"></div>

  <div class="main">
    <div class="topbar"><span class="topbar-title">パスワード変更</span></div>
    <div class="content">

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <div class="card" style="max-width:480px;">
        <div class="card-title">パスワードを変更する</div>
        <form th:action="@{/app/password-resets}" method="post">
          <div class="form-group">
            <label class="form-label" for="currentPassword">現在のパスワード<span class="required">*</span></label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input id="currentPassword" type="password" name="currentPassword"
                     class="form-control" required autocomplete="current-password" style="flex:1;min-width:0;">
              <button type="button" aria-label="現在のパスワードを表示する"
                      onclick="togglePasswordVisibility('currentPassword', this)"
                      style="border:1px solid #CBD5E1;background:#fff;border-radius:8px;padding:0 12px;height:40px;cursor:pointer;font-size:18px;line-height:1;">
                👁
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="newPassword">新しいパスワード<span class="required">*</span></label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input id="newPassword" type="password" name="newPassword"
                     class="form-control" required minlength="8" autocomplete="new-password" style="flex:1;min-width:0;">
              <button type="button" aria-label="新しいパスワードを表示する"
                      onclick="togglePasswordVisibility('newPassword', this)"
                      style="border:1px solid #CBD5E1;background:#fff;border-radius:8px;padding:0 12px;height:40px;cursor:pointer;font-size:18px;line-height:1;">
                👁
              </button>
            </div>
            <div class="form-hint">8文字以上で入力してください</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="confirmPassword">新しいパスワード（確認）<span class="required">*</span></label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input id="confirmPassword" type="password" name="confirmPassword"
                     class="form-control" required minlength="8" autocomplete="new-password" style="flex:1;min-width:0;">
              <button type="button" aria-label="確認用パスワードを表示する"
                      onclick="togglePasswordVisibility('confirmPassword', this)"
                      style="border:1px solid #CBD5E1;background:#fff;border-radius:8px;padding:0 12px;height:40px;cursor:pointer;font-size:18px;line-height:1;">
                👁
              </button>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:8px;">
            <button type="submit" class="btn btn-primary">変更する</button>
            <a th:href="@{/app/dashboard}" class="btn btn-secondary">キャンセル</a>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
<script>
  function togglePasswordVisibility(inputId, button) {
    const input = document.getElementById(inputId);
    if (!input) return;
    const visible = input.type === 'text';
    input.type = visible ? 'password' : 'text';
    if (button) {
      button.textContent = visible ? '👁' : '🙈';
      button.setAttribute('aria-label', visible ? 'パスワードを表示する' : 'パスワードを隠す');
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワードをお忘れの方 | Pet Life Plus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">本文へ移動</a>
<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="/index.html">ペットライフプラス</a>
    <button class="menu-toggle" aria-expanded="false" aria-controls="global-nav" aria-label="メニューを開く">☰</button>
    <nav id="global-nav" class="global-nav" aria-label="グローバルナビゲーション">
      <a href="/index.html">トップ</a>
      <a href="/f_service.html">総合案内</a>
      <a href="/f_flow.html">導入事例と実績</a>
      <a href="/webapp.html">ログイン</a>
      <a href="/f_contact.html" class="btn btn-primary">お問い合わせ</a>
    </nav>
  </div>
</header>

<main id="main" class="section">
  <div class="container container-narrow view-small">
    <h1>パスワードをお忘れの方</h1>
    <p style="color:#6b7280;margin-bottom:24px;">
      ご登録のメールアドレスを入力してください。<br>
      パスワード再設定用のリンクをメールでお送りします。
    </p>

    <form th:action="@{/app/forgot-password}" method="post" class="contact-form" style="margin-top:12px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="field">
        <label for="email">メールアドレス</label>
        <input id="email" type="email" name="email"
               placeholder="example@petlifeplus.local"
               autocomplete="email" required>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">送信する</button>
        <a class="btn btn-secondary" th:href="@{/app/login}">ログイン画面へ戻る</a>
      </div>
    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-grid footer-grid-single">
    <a href="/index.html">トップ</a>
    <a href="/f_service.html">総合案内</a>
    <a href="/f_flow.html">導入事例と実績</a>
    <a href="/f_info.html">運営情報・規約</a>
  </div>
</footer>
<script src="/assets/js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新しいパスワードを設定 | Pet Life Plus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">本文へ移動</a>
<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="/index.html">ペットライフプラス</a>
    <button class="menu-toggle" aria-expanded="false" aria-controls="global-nav" aria-label="メニューを開く">☰</button>
    <nav id="global-nav" class="global-nav" aria-label="グローバルナビゲーション">
      <a href="/index.html">トップ</a>
      <a href="/f_service.html">総合案内</a>
      <a href="/f_flow.html">導入事例と実績</a>
      <a href="/webapp.html">ログイン</a>
      <a href="/f_contact.html" class="btn btn-primary">お問い合わせ</a>
    </nav>
  </div>
</header>

<main id="main" class="section">
  <div class="container container-narrow view-small">
    <h1>新しいパスワードを設定</h1>

    <!-- トークン無効 -->
    <div th:if="${invalid}"
         style="padding:14px 16px;border-radius:10px;border:1px solid #fecaca;background:#fef2f2;color:#991b1b;margin-bottom:20px;">
      このリンクは無効または期限切れです。
      <a th:href="@{/app/forgot-password}" style="color:#991b1b;font-weight:600;">
        再設定メールを再送する
      </a>
    </div>

    <!-- バリデーションエラー -->
    <div th:if="${error}"
         style="padding:14px 16px;border-radius:10px;border:1px solid #fecaca;background:#fef2f2;color:#991b1b;margin-bottom:20px;"
         th:text="${error}"></div>

    <!-- フォーム（トークン有効時のみ表示） -->
    <form th:if="${!invalid}"
          th:action="@{/app/reset-password}" method="post"
          class="contact-form" style="margin-top:12px;">
      <input type="hidden" name="token" th:value="${token}">

      <div class="field">
        <label for="newPassword">新しいパスワード</label>
        <input id="newPassword" type="password" name="newPassword"
               placeholder="8文字以上" minlength="8"
               autocomplete="new-password" required>
        <small style="color:#6b7280;">8文字以上で入力してください</small>
      </div>
      <div class="field">
        <label for="confirmPassword">新しいパスワード（確認）</label>
        <input id="confirmPassword" type="password" name="confirmPassword"
               placeholder="もう一度入力" minlength="8"
               autocomplete="new-password" required>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">パスワードを変更する</button>
      </div>
    </form>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-grid footer-grid-single">
    <a href="/index.html">トップ</a>
    <a href="/f_service.html">総合案内</a>
    <a href="/f_flow.html">導入事例と実績</a>
    <a href="/f_info.html">運営情報・規約</a>
  </div>
</footer>
<script src="/assets/js/main.js"></script>
</body>
</html>

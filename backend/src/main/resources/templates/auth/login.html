<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | Pet Life Plus</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:40px;">🐾</div>
      <div class="login-logo-title">Pet Life Plus</div>
      <div class="login-logo-sub">ペット健康管理プラットフォーム</div>
    </div>

    <h1 class="login-title">ログイン</h1>

    <div th:if="${param.error}" class="alert alert-error">
      メールアドレスまたはパスワードが正しくありません。
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
      ログアウトしました。
    </div>

    <form th:action="@{/app/login}" method="post">
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス<span class="required">*</span></label>
        <input id="email" type="email" name="email" class="form-control"
               placeholder="example@petlifeplus.local" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード<span class="required">*</span></label>
        <input id="password" type="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
        ログイン
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:#64748B;">
      <a th:href="@{/}" style="color:#1D4ED8;">← サイトトップへ戻る</a>
    </p>
  </div>
</div>
</body>
</html>

spring.application.name=petlife
server.port=${PORT:8080}

# Force UTF-8 for request/response, message bundles, and URL decoding.
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.messages.encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petlifeplus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hs0512}
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema/data from classpath SQL (never = disabled; apply manually or use backup restore)
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Enable hidden HTTP method filter for PUT/PATCH/DELETE from HTML forms
spring.mvc.hiddenmethod.filter.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve frontend static files and uploaded assets regardless of working directory
# - file:frontend/public/  : when launched from repository root
# - file:../frontend/public/: when launched from backend directory
# /uploads/** is served via WebMvcConfig.addResourceHandlers (file:uploads/)
spring.web.resources.static-locations=classpath:/static/,file:frontend/public/,file:../frontend/public/

# Login screen switch:
# - false: show normal login screen (/app/login)
# - true : show maintenance page (/webapp.html)
app.login-maintenance-mode=false

# Slack Bot Token (xoxb-...)
slack.bot-token=${SLACK_BOT_TOKEN:}
slack.signing-secret=${SLACK_SIGNING_SECRET:}
# カンマ区切りで管理者の Slack ユーザーID を設定 (例: U012ABC3DEF,U999XYZ)
admin.slack-user-ids=${ADMIN_SLACK_USER_IDS:U0B5CC9S48N}

# LINE Messaging API
line.channel-token=${LINE_CHANNEL_TOKEN:}
line.channel-secret=${LINE_CHANNEL_SECRET:}
# カンマ区切りで管理者の LINE ユーザーID を設定 (例: Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx)
admin.line-user-ids=${ADMIN_LINE_USER_IDS:@434idigg}

# Zoom meeting base URL for premium online care
zoom.meeting-base-url=${ZOOM_MEETING_BASE_URL:https://zoom.us/j}
zoom.api-base-url=${ZOOM_API_BASE_URL:https://api.zoom.us/v2}
zoom.oauth-base-url=${ZOOM_OAUTH_BASE_URL:https://zoom.us/oauth/token}
zoom.account-id=${ZOOM_ACCOUNT_ID:}
zoom.client-id=${ZOOM_CLIENT_ID:}
zoom.client-secret=${ZOOM_CLIENT_SECRET:}

# OpenAI API settings for AI symptom check
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# SendGrid SMTP (password reset email)
# SENDGRID_API_KEY を設定しない場合はメール送信をスキップし、ログに警告を出力
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@petlifeplus.local}
sendgrid.from-name=ペットライフプラス

# Application base URL (used in password reset email link)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Database backup / restore (pg_dump / psql binary paths)
# Override with env vars if binaries are not on PATH
# e.g. PG_DUMP_PATH=/usr/lib/postgresql/16/bin/pg_dump
db.backup.pg-dump-path=${PG_DUMP_PATH:pg_dump}
db.backup.psql-path=${PSQL_PATH:psql}

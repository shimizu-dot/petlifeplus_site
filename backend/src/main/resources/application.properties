spring.application.name=petlife

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petlifeplus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hs0512}
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema/data from classpath SQL (always = runs on every startup)
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# Disable Hibernate DDL auto (MyBatis primary)
spring.jpa.hibernate.ddl-auto=none

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Enable hidden HTTP method filter for PUT/PATCH/DELETE from HTML forms
spring.mvc.hiddenmethod.filter.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve frontend static files and uploaded assets regardless of working directory
# - file:frontend/public/  : when launched from repository root
# - file:../frontend/public/: when launched from backend directory
# - file:uploads/          : when launched from backend directory
# - file:backend/uploads/  : when launched from repository root
spring.web.resources.static-locations=classpath:/static/,file:frontend/public/,file:../frontend/public/,file:uploads/,file:backend/uploads/

# Slack Bot Token (xoxb-...)
slack.bot-token=${SLACK_BOT_TOKEN:}
slack.signing-secret=${SLACK_SIGNING_SECRET:}

# Zoom meeting base URL for premium online care
zoom.meeting-base-url=${ZOOM_MEETING_BASE_URL:https://zoom.us/j}
zoom.api-base-url=${ZOOM_API_BASE_URL:https://api.zoom.us/v2}
zoom.oauth-base-url=${ZOOM_OAUTH_BASE_URL:https://zoom.us/oauth/token}
zoom.account-id=${ZOOM_ACCOUNT_ID:}
zoom.client-id=${ZOOM_CLIENT_ID:}
zoom.client-secret=${ZOOM_CLIENT_SECRET:}

# OpenAI API settings for AI symptom check
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

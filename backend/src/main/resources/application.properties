spring.application.name=petlife
server.port=${PORT:8080}

# Force UTF-8 for request/response, message bundles, and URL decoding.
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.messages.encoding=UTF-8
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/petlifeplus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hs0512}
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema/data from classpath SQL
# always = 起動時に schema.sql → data.sql を自動実行（両ファイルとも冪等）
# never  = 自動実行しない（本番環境や手動管理時に設定）
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Enable hidden HTTP method filter for PUT/PATCH/DELETE from HTML forms
spring.mvc.hiddenmethod.filter.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve frontend static files and uploaded assets regardless of working directory
# - file:frontend/public/  : when launched from repository root
# - file:../frontend/public/: when launched from backend directory
# file: paths come first so frontend edits are served immediately in dev (hot reload).
# classpath:/static/ is last and used only for backend-specific files (app.css, icons).
# /uploads/** is served via WebMvcConfig.addResourceHandlers (file:uploads/)
spring.web.resources.static-locations=file:../frontend/public/,file:frontend/public/,classpath:/static/

# Login screen switch:
# - false: show normal login screen (/app/login)
# - true : show maintenance page (/webapp.html)
app.login-maintenance-mode=false

# Slack Bot Token (xoxb-...)
slack.bot-token=${SLACK_BOT_TOKEN:}
slack.signing-secret=${SLACK_SIGNING_SECRET:}
# カンマ区切りで管理者の Slack ユーザーID を設定 (例: U012ABC3DEF,U999XYZ)
admin.slack-user-ids=${ADMIN_SLACK_USER_IDS:}

# LINE Messaging API
line.channel-token=${LINE_CHANNEL_TOKEN:}
line.channel-secret=${LINE_CHANNEL_SECRET:}
# カンマ区切りで管理者の LINE ユーザーID を設定 (例: Uxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx)
admin.line-user-ids=${ADMIN_LINE_USER_IDS:}

# Zoom meeting base URL for premium online care
zoom.meeting-base-url=${ZOOM_MEETING_BASE_URL:https://zoom.us/j}
zoom.api-base-url=${ZOOM_API_BASE_URL:https://api.zoom.us/v2}
zoom.oauth-base-url=${ZOOM_OAUTH_BASE_URL:https://zoom.us/oauth/token}
zoom.account-id=${ZOOM_ACCOUNT_ID:}
zoom.client-id=${ZOOM_CLIENT_ID:}
zoom.client-secret=${ZOOM_CLIENT_SECRET:}

# OpenAI API settings for AI symptom check (F-009 / SymptomCheckService)
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# Chatbot API settings (F-022 / ConsultChatService) — free-tier Groq by default
# Groq free tier: https://console.groq.com/  (API key 取得後 CHATBOT_API_KEY に設定)
# 未設定時はキーワードベース fallbackReply() で動作（全ユーザー利用可）
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.model=${CHATBOT_MODEL:llama-3.1-8b-instant}
chatbot.base-url=${CHATBOT_BASE_URL:https://api.groq.com/openai/v1}

# SendGrid SMTP (password reset email)
# SENDGRID_API_KEY を設定しない場合はメール送信をスキップし、ログに警告を出力
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@petlife.local}
sendgrid.from-name=ペットライフプラス
contact.to-email=${CONTACT_TO_EMAIL:${SENDGRID_FROM_EMAIL:noreply@petlife.local}}

# Application base URL (used in password reset email link)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# 請求通知 — 銀行振込先情報（通知メッセージ・メールに埋め込まれる）
billing.bank-name=${BILLING_BANK_NAME:〇〇銀行}
billing.bank-branch=${BILLING_BANK_BRANCH:△△支店}
billing.bank-account-number=${BILLING_BANK_ACCOUNT_NUMBER:12345678}
billing.bank-account-holder=${BILLING_BANK_ACCOUNT_HOLDER:PetLife 事務局}

# 請求通知 — PayPay 情報（空の場合はテキスト案内のみ）
# PayPay QR コード画像 URL（メール HTML に <img> として埋め込む）
billing.paypay-qr-url=${BILLING_PAYPAY_QR_URL:}
# PayPay 送金先 ID（QR URL 未設定時のテキスト案内に使用）
billing.paypay-id=${BILLING_PAYPAY_ID:}

# Database backup / restore (pg_dump / psql binary paths)
# Override with env vars if binaries are not on PATH
# e.g. PG_DUMP_PATH=/usr/lib/postgresql/16/bin/pg_dump
db.backup.pg-dump-path=${PG_DUMP_PATH:pg_dump}
db.backup.psql-path=${PSQL_PATH:psql}

# Upload directory for pet and health-record images
# Override with UPLOAD_DIR env var for absolute path in production (e.g. /data/uploads)
app.upload.dir=${UPLOAD_DIR:uploads}
